<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Celestial Arc | Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/landing.css') }}?v=5.0">
    <style>
        .auth-container{max-width:440px;margin:120px auto 60px;padding:0 20px}
        .auth-card{background:rgba(10,6,30,0.85);border:1px solid rgba(139,92,246,0.25);border-radius:20px;padding:40px 36px;backdrop-filter:blur(20px);box-shadow:0 0 60px rgba(139,92,246,0.08)}
        .auth-title{font-family:'Cinzel',serif;font-size:1.8rem;text-align:center;background:linear-gradient(135deg,#c4b5fd,#818cf8,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
        .auth-sub{text-align:center;color:rgba(196,181,253,0.7);font-size:0.9rem;margin-bottom:32px}
        .auth-input{width:100%;padding:14px 18px;background:rgba(139,92,246,0.08);border:1px solid rgba(139,92,246,0.2);border-radius:12px;color:#e2e0ff;font-size:0.95rem;font-family:'Poppins',sans-serif;outline:none;transition:border-color 0.3s;margin-bottom:16px;box-sizing:border-box}
        .auth-input:focus{border-color:rgba(139,92,246,0.6);box-shadow:0 0 20px rgba(139,92,246,0.1)}
        .auth-input::placeholder{color:rgba(196,181,253,0.4)}
        .auth-btn{width:100%;padding:14px;background:linear-gradient(135deg,#7c3aed,#6366f1);color:white;border:none;border-radius:12px;font-size:1rem;font-weight:600;font-family:'Poppins',sans-serif;cursor:pointer;transition:all 0.3s;margin-top:8px}
        .auth-btn:hover{transform:translateY(-1px);box-shadow:0 8px 30px rgba(99,102,241,0.35)}
        .auth-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none}
        .auth-divider{display:flex;align-items:center;gap:12px;margin:24px 0;color:rgba(196,181,253,0.4);font-size:0.8rem}
        .auth-divider::before,.auth-divider::after{content:'';flex:1;height:1px;background:rgba(139,92,246,0.2)}
        .auth-google{width:100%;padding:13px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.12);border-radius:12px;color:#e2e0ff;font-size:0.95rem;font-family:'Poppins',sans-serif;cursor:pointer;transition:all 0.3s;display:flex;align-items:center;justify-content:center;gap:10px}
        .auth-google:hover{background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.2)}
        .auth-switch{text-align:center;margin-top:24px;color:rgba(196,181,253,0.6);font-size:0.85rem}
        .auth-switch a{color:#a78bfa;text-decoration:none;font-weight:500}
        .auth-switch a:hover{text-decoration:underline}
        .auth-error{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:10px;padding:12px 16px;color:#fca5a5;font-size:0.85rem;margin-bottom:16px;display:none}
        .auth-success{background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.3);border-radius:10px;padding:12px 16px;color:#86efac;font-size:0.85rem;margin-bottom:16px;display:none}
        .auth-tabs{display:flex;gap:0;margin-bottom:28px;border-radius:12px;overflow:hidden;border:1px solid rgba(139,92,246,0.2)}
        .auth-tab{flex:1;padding:12px;text-align:center;font-size:0.9rem;font-weight:500;cursor:pointer;background:transparent;border:none;color:rgba(196,181,253,0.5);font-family:'Poppins',sans-serif;transition:all 0.3s}
        .auth-tab.active{background:rgba(139,92,246,0.15);color:#c4b5fd}
        .auth-form{display:none}.auth-form.active{display:block}
    </style>
</head>
<body class="slide-scroll-container">
    <div class="cosmic-bg" aria-hidden="true">
        <div class="nebula nebula-1"></div>
        <div class="nebula nebula-2"></div>
    </div>

    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="logo">
                <div class="logo-orb"></div>
                <span class="logo-text">CELESTIAL ARC</span>
            </a>
            <div class="nav-links">
                <a href="/" class="nav-link">Home</a>
                <a href="/app" class="nav-link">Get Reading</a>
            </div>
        </div>
    </nav>

    <div class="auth-container">
        <div class="auth-card">
            <h1 class="auth-title">Welcome Back</h1>
            <p class="auth-sub">Sign in to access your cosmic journey</p>

            <div class="auth-tabs">
                <button class="auth-tab active" onclick="switchTab('login')">Sign In</button>
                <button class="auth-tab" onclick="switchTab('signup')">Create Account</button>
            </div>

            <div id="authError" class="auth-error"></div>
            <div id="authSuccess" class="auth-success"></div>

            <!-- Login Form -->
            <div id="loginForm" class="auth-form active">
                <input type="email" id="loginEmail" class="auth-input" placeholder="Email address" autocomplete="email">
                <input type="password" id="loginPassword" class="auth-input" placeholder="Password" autocomplete="current-password">
                <button id="loginBtn" class="auth-btn" onclick="handleLogin()">Sign In</button>
            </div>

            <!-- Signup Form -->
            <div id="signupForm" class="auth-form">
                <input type="email" id="signupEmail" class="auth-input" placeholder="Email address" autocomplete="email">
                <input type="password" id="signupPassword" class="auth-input" placeholder="Password (min 8 characters)" autocomplete="new-password">
                <input type="password" id="signupConfirm" class="auth-input" placeholder="Confirm password" autocomplete="new-password">
                <button id="signupBtn" class="auth-btn" onclick="handleSignup()">Create Account</button>
            </div>

            <div class="auth-divider">or continue with</div>
            <button class="auth-google" onclick="handleGoogleAuth()">
                <svg width="20" height="20" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                Google
            </button>

            <div class="auth-switch">
                <span id="switchText">Don't have an account? <a href="#" onclick="switchTab('signup');return false">Sign up</a></span>
            </div>
        </div>
    </div>

    <script>
        // Check if already logged in
        const token = localStorage.getItem('celestial_token');
        if (token) window.location.href = '/dashboard';

        function switchTab(tab) {
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
            document.getElementById('authError').style.display = 'none';
            document.getElementById('authSuccess').style.display = 'none';
            if (tab === 'login') {
                document.querySelector('.auth-tab:first-child').classList.add('active');
                document.getElementById('loginForm').classList.add('active');
                document.getElementById('switchText').innerHTML = 'Don\'t have an account? <a href="#" onclick="switchTab(\'signup\');return false">Sign up</a>';
                document.querySelector('.auth-title').textContent = 'Welcome Back';
                document.querySelector('.auth-sub').textContent = 'Sign in to access your cosmic journey';
            } else {
                document.querySelector('.auth-tab:last-child').classList.add('active');
                document.getElementById('signupForm').classList.add('active');
                document.getElementById('switchText').innerHTML = 'Already have an account? <a href="#" onclick="switchTab(\'login\');return false">Sign in</a>';
                document.querySelector('.auth-title').textContent = 'Join the Stars';
                document.querySelector('.auth-sub').textContent = 'Create your account to save your readings';
            }
        }

        function showError(msg) {
            const el = document.getElementById('authError');
            el.textContent = msg; el.style.display = 'block';
            document.getElementById('authSuccess').style.display = 'none';
        }
        function showSuccess(msg) {
            const el = document.getElementById('authSuccess');
            el.textContent = msg; el.style.display = 'block';
            document.getElementById('authError').style.display = 'none';
        }

        async function handleLogin() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            if (!email || !password) return showError('Please fill in all fields');
            const btn = document.getElementById('loginBtn');
            btn.disabled = true; btn.textContent = 'Signing in...';
            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({email, password})
                });
                const data = await res.json();
                if (data.success && data.session) {
                    localStorage.setItem('celestial_token', data.session.access_token);
                    localStorage.setItem('celestial_user', JSON.stringify(data.user));
                    window.location.href = '/dashboard';
                } else {
                    showError(data.error || 'Login failed');
                }
            } catch (e) { showError('Network error. Please try again.'); }
            btn.disabled = false; btn.textContent = 'Sign In';
        }

        async function handleSignup() {
            const email = document.getElementById('signupEmail').value.trim();
            const password = document.getElementById('signupPassword').value;
            const confirm = document.getElementById('signupConfirm').value;
            if (!email || !password) return showError('Please fill in all fields');
            if (password.length < 8) return showError('Password must be at least 8 characters');
            if (password !== confirm) return showError('Passwords do not match');
            const btn = document.getElementById('signupBtn');
            btn.disabled = true; btn.textContent = 'Creating account...';
            try {
                const res = await fetch('/api/auth/signup', {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({email, password})
                });
                const data = await res.json();
                if (data.success) {
                    showSuccess('Account created! Check your email to verify, then sign in.');
                    setTimeout(() => switchTab('login'), 2000);
                } else { showError(data.error || 'Signup failed'); }
            } catch (e) { showError('Network error. Please try again.'); }
            btn.disabled = false; btn.textContent = 'Create Account';
        }

        async function handleGoogleAuth() {
            try {
                const res = await fetch('/api/auth/google');
                const data = await res.json();
                if (data.success && data.url) window.location.href = data.url;
                else showError('Google sign-in not available');
            } catch (e) { showError('Google sign-in failed'); }
        }

        // Enter key handlers
        document.getElementById('loginPassword').addEventListener('keypress', e => { if (e.key === 'Enter') handleLogin(); });
        document.getElementById('signupConfirm').addEventListener('keypress', e => { if (e.key === 'Enter') handleSignup(); });
    </script>
</body>
</html>
